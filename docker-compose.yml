# ============================================================
# Docker Compose — Claims Lakehouse Predictive Optimizer
# ============================================================
# Architecture: 3 services
#   1. API (FastAPI + PySpark + Delta Lake) — the brain
#   2. PostgreSQL — operations metadata storage
#   3. Frontend (Streamlit) — visual dashboard
#
# Spark runs in "local mode" inside the API container.
# This is standard for development & portfolio projects.
# In production, connect to Databricks/EMR/Dataproc cluster.
# ============================================================

services:

  # ============================================
  # SERVICE 1: API + Spark Engine (The Brain)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optimizer-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://optimizer:opt_pass@postgres:5432/optimizer_db
      - SPARK_MODE=local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./scripts:/app/scripts
    networks:
      - optimizer-network
    restart: unless-stopped

  # ============================================
  # SERVICE 2: PostgreSQL (The Memory)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: optimizer-postgres
    environment:
      POSTGRES_DB: optimizer_db
      POSTGRES_USER: optimizer
      POSTGRES_PASSWORD: opt_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optimizer-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U optimizer -d optimizer_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # SERVICE 3: Streamlit Dashboard (The Face)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optimizer-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - optimizer-network
    restart: unless-stopped

volumes:
  postgres_data:


networks:
  optimizer-network:
    driver: bridge
